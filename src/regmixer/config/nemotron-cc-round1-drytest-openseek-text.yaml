name: "nemo-cc-round1-drytest-openseek-text"
description: "Round-1 dry test for Nemotron-CC internal mixture search on OpenSeek text dataset"
budget: "ai2/oe-data"
workspace: "ai2/dolma2"
nodes: 1
gpus: 1
variants: 4
preemptible: true
max_tokens: 50_000_000
allow_repetition: true
sequence_length: 2048
seed: 42
source_mix_temperature: 0.8
topic_mix_temperature: 0.8
minimum_source_weight: 0.01
minimum_topic_weight: 0.05
min_source_strength: 0.2
max_source_strength: 5
min_topic_strength: 0.2
max_topic_strength: 5
sample_multiplier: 20
proxy_model_id: "olmo_30m"
tokenizer: "dolma2"
weka: false
dtype: "uint32"
priority: low
cluster: ai2/augusta-google-1
device_batch_size: 8

