name: "nemo-cc-round1b-kind2"
description: "Round-1b: kind2 类型比例搜索（6 种数据类型 × 30 variants × 3B tokens）"
budget: "ai2/oe-data"
workspace: "ai2/dolma2"
nodes: 1
gpus: 1
variants: 30  # 6 种 kind2 类型 × 5 = 30 variants
preemptible: true
max_tokens: 3_000_000_000  # 3B tokens（30M * 20 * 5 == 5xC scale）
allow_repetition: true  # 必须启用：最小数据集 0.21B tokens
max_repetition_ratio: 5.0  # 允许数据循环最多 5 倍
sequence_length: 2048
seed: 42
temperature: 0.75
minimum_weight: 0.0001
min_strength: 0.1
max_strength: 20
sample_multiplier: 50
proxy_model_id: "olmo_30m"  # 30M 参数模型
tokenizer: "openseek"  # OpenSeek tokenizer（vocab=151851, eos=151850）
weka: false
dtype: "uint32"  # OpenSeek 需要 uint32
priority: low
cluster: local
device_batch_size: 1  # 24GB GPU + openseek vocab 下避免 logits/backward OOM

# ============================================================================
# ⚠️ IMPORTANT: 必须先完成 Round-1a 获取 p*_actual_quality
# ============================================================================
# Round-1a 输出: p*_actual_quality = {high: a%, medium_high: b%, medium: c%, medium_low: d%, low: e%}
#
# 此配置依赖 Round-1a 的结果：
# 1. 运行 Round-1a (nemotron-cc-round1a-actual-quality.yaml)
# 2. 获取最优质量分布 p*_actual_quality
# 3. 将权重填入下方 actual 的 topics 中（取消注释 weight 字段）
# 4. 运行此 Round-1b 配置
# ============================================================================

sources:
  - name: actual
    # ⚠️ TODO: 从 Round-1a 结果填入固定权重
    # 当前配置：搜索模式（regmixer 会自动分配权重）
    # 需要修改为：固定权重模式（从 Round-1a 获取）
    topics:
      - name: high
        paths:
          - /home/staff/jiayining/Datasets/OpenSeek-Pretrain-100B/Datasets/OpenSeek-Pretrain-100B_text/Nemotron-CC-high-actual-actual-high_part_*_text_document/train-*.parquet
        # weight: <from Round-1a p*_actual_quality>
      - name: medium_high
        paths:
          - /home/staff/jiayining/Datasets/OpenSeek-Pretrain-100B/Datasets/OpenSeek-Pretrain-100B_text/Nemotron-CC-medium-actual-actual-high_part_*_text_document/train-*.parquet
        # weight: <from Round-1a p*_actual_quality>
      - name: medium
        paths:
          - /home/staff/jiayining/Datasets/OpenSeek-Pretrain-100B/Datasets/OpenSeek-Pretrain-100B_text/Nemotron-CC-high-actual-actual-mid_part_*_text_document/train-*.parquet
        # weight: <from Round-1a p*_actual_quality>

  - name: distill
    paths:
      - /home/staff/jiayining/Datasets/OpenSeek-Pretrain-100B/Datasets/OpenSeek-Pretrain-100B_text/Nemotron-CC-high-synthetic-distill-high_part_*_text_document/train-*.parquet

  - name: diverse_qa_pairs
    paths:
      - /home/staff/jiayining/Datasets/OpenSeek-Pretrain-100B/Datasets/OpenSeek-Pretrain-100B_text/Nemotron-CC-high-synthetic-diverse_qa_pairs-high_part_*_text_document/train-*.parquet

  - name: extract_knowledge
    paths:
      - /home/staff/jiayining/Datasets/OpenSeek-Pretrain-100B/Datasets/OpenSeek-Pretrain-100B_text/Nemotron-CC-high-synthetic-extract_knowledge-high_part_*_text_document/train-*.parquet

  - name: knowledge_list
    paths:
      - /home/staff/jiayining/Datasets/OpenSeek-Pretrain-100B/Datasets/OpenSeek-Pretrain-100B_text/Nemotron-CC-high-synthetic-knowledge_list-high_part_*_text_document/train-*.parquet

  - name: wrap_medium
    topics:
      - name: high
        paths:
          - /home/staff/jiayining/Datasets/OpenSeek-Pretrain-100B/Datasets/OpenSeek-Pretrain-100B_text/Nemotron-CC-high-synthetic-wrap_medium-high_part_*_text_document/train-*.parquet
      - name: low
        paths:
          - /home/staff/jiayining/Datasets/OpenSeek-Pretrain-100B/Datasets/OpenSeek-Pretrain-100B_text/Nemotron-CC-low-synthetic-wrap_medium-low_part_*_text_document/train-*.parquet

nonzero_weight:
  - actual
  - distill
  - diverse_qa_pairs
  - extract_knowledge
  - knowledge_list
  - wrap_medium

manual_prior:
  # 先验分布（基于实际token统计 - 2026-02-12）
  # actual: 3080B / 4616.8B = 0.6671 (66.71%)
  # distill: 157.6B / 4616.8B = 0.0341 (3.41%)
  # diverse_qa_pairs: 499.5B / 4616.8B = 0.1082 (10.82%)
  # extract_knowledge: 303.6B / 4616.8B = 0.0658 (6.58%)
  # knowledge_list: 203.2B / 4616.8B = 0.0440 (4.40%)
  # wrap_medium: 372.9B / 4616.8B = 0.0808 (8.08%)
  actual: 0.6671
  distill: 0.0341
  diverse_qa_pairs: 0.1082
  extract_knowledge: 0.0658
  knowledge_list: 0.0440
  wrap_medium: 0.0808

# ============================================================================
# Round-1b: kind2 类型比例搜索（使用高质量数据）
# ============================================================================
# 目标: 找到 6 种数据类型的最优比例
# Variants: 6 种 kind2 类型 × 5 = 30 variants
# 输出: p*_kind2 = {actual: X%, distill: Y%, qa: Z%, extract: A%, knowledge: B%, wrap: C%}
#
# 数据充足度分析（实际统计 - 2026-02-12）
# Kind2             | Original Tokens | 先验分布 | 说明
# ------------------|-----------------|----------|------
# actual (高质量)   |     3080B       | 66.71%   | ✅ 使用 Round-1a 固定权重
# diverse_qa_pairs  |     499.5B      | 10.82%   | HQ-diverse_qa
# wrap_medium       |     372.9B      |  8.08%   | HQ-wrap_medium
# extract_knowledge |     303.6B      |  6.58%   | HQ-extract_knowledge
# knowledge_list    |     203.2B      |  4.40%   | HQ-knowledge_list
# distill           |     157.6B      |  3.41%   | HQ-distill
# ------------------|-----------------|----------|------
# Total             |    4616.8B      | 100.00%  | -
#
# ⚠️ 数据循环限制：max_repetition_ratio=5.0（最多循环 5 倍）
# ✅ actual 使用高质量数据（仅 high/medium_high/medium），使用 Round-1a 固定权重
# ✅ allow_repetition=true 已启用
# ℹ️ 先验分布来源：manual_prior 基于实际token数计算
